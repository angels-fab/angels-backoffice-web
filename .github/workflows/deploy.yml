name: Build and Deploy

# main에 push될 때마다 자동 실행 (수동 실행도 가능)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 빌드 (dist/ 생성)
        run: npm run build

      # dist/ 결과물을 angels-fab.github.io 저장소의 main으로 push = 배포
      - name: angels-fab.github.io 로 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: angels-fab/angels-fab.github.io
          publish_branch: main
          publish_dir: ./dist
          # 빌드 결과로 통째 교체. .nojekyll은 자동 추가됨.
          # legacy.html·favicon.png은 public/에 있어 dist에 항상 포함됨.
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.event.head_commit.message }}"

      # angels-fab.github.io는 레거시(브랜치) Pages 빌드라 간헐적으로 "Page build failed"가 난다.
      # 실패하면 사람이 재요청해야 했던 걸 자동화 — errored면 빌드를 다시 요청, built 확인까지 반복.
      - name: Pages 빌드 확인·실패 시 자동 재시도
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          REPO=angels-fab/angels-fab.github.io
          sleep 25 # push 후 새 빌드가 큐에 잡히도록 대기
          for i in $(seq 1 10); do
            STATUS=$(gh api "repos/$REPO/pages/builds/latest" --jq .status 2>/dev/null || echo "unknown")
            echo "[$i/10] Pages 빌드 상태: $STATUS"
            case "$STATUS" in
              built)   echo "✅ Pages 빌드 성공"; exit 0 ;;
              errored) echo "⚠️ 빌드 실패 — 재요청"; gh api -X POST "repos/$REPO/pages/builds" >/dev/null 2>&1 || true; sleep 30 ;;
              *)       sleep 20 ;;  # building/queued/unknown — 계속 대기
            esac
          done
          echo "::warning::Pages 빌드가 자동 재시도 후에도 built로 확정되지 않음 — 수동 확인 필요"
