<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>업무현황 KPI 2열 시안</title>
  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#0f1117;--panel:#161b22;--panel2:#1b222d;--line:#2a3444;
      --text:#fff;--muted:#aab4c3;--dim:#788496;
      --green:#4da167;--green-bg:rgba(77,161,103,.13);
      --amber:#d6a23e;--amber-bg:rgba(214,162,62,.13);
      --purple:#a98ae0;--purple-bg:rgba(169,138,224,.13);
      --gray:#8e99aa;--gray-bg:rgba(142,153,170,.11);
    }
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;padding:32px}
    .wrap{width:100%;max-width:1080px;min-width:0}
    .eyebrow{font-size:12px;font-weight:750;color:var(--dim);margin:0 0 10px 2px;letter-spacing:.03em}
    .kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .kpi{min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:14px;transition:.16s ease;box-shadow:0 14px 38px rgba(0,0,0,.14)}
    .kpi[data-active="true"].ongoing{border-color:rgba(77,161,103,.72);background:linear-gradient(135deg,var(--green-bg),var(--panel) 60%)}
    .kpi[data-active="true"].done{border-color:rgba(142,153,170,.7);background:linear-gradient(135deg,var(--gray-bg),var(--panel) 60%)}
    .main{display:flex;align-items:stretch;gap:14px;min-height:104px;cursor:pointer;border:0;background:transparent;color:inherit;padding:0;text-align:left;width:100%}
    .labelbox{width:92px;flex:0 0 92px;border-radius:15px;display:grid;place-items:center;font-size:20px;font-weight:850;line-height:1.15;text-align:center}
    .ongoing .labelbox{background:var(--green-bg);color:#72c78d}
    .done .labelbox{background:var(--gray-bg);color:#c0c8d3}
    .metric{align-self:center;min-width:0}
    .metric .name{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:5px}
    .metric .value{font-size:45px;font-weight:850;line-height:1;letter-spacing:-.045em}
    .metric .unit{font-size:16px;color:var(--muted);font-weight:650;margin-left:5px;letter-spacing:0}
    .metric .ratio{font-size:17px;color:var(--dim);font-weight:700;margin-left:3px;letter-spacing:-.02em}
    .main-spacer{flex:1}
    .check{align-self:center;min-width:92px;min-height:74px;border:1px solid rgba(169,138,224,.48);background:var(--purple-bg);border-radius:13px;padding:11px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#c3a9f1}
    .check strong{font-size:22px;line-height:1}.check span{font-size:12px;font-weight:800}
    .subrow{display:grid;grid-template-columns:1fr;gap:8px;border-top:1px solid rgba(255,255,255,.065);padding-top:12px}
    .sub{width:100%;min-height:48px;border:1px solid transparent;border-radius:11px;padding:0 12px;display:flex;align-items:center;gap:10px;background:var(--panel2);color:var(--muted);font:inherit;cursor:pointer;text-align:left;transition:.14s ease}
    .sub:hover{transform:translateY(-1px)}
    .sub.hold{border-color:rgba(214,162,62,.27);background:var(--amber-bg)}
    .sub.remind{border-color:rgba(214,162,62,.22);background:rgba(214,162,62,.09)}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px rgba(214,162,62,.1)}
    .sub-label{font-size:13px;font-weight:800;color:#e1be78}.sub-desc{font-size:11px;color:var(--dim)}
    .sub-count{margin-left:auto;font-size:18px;font-weight:850;color:#edc875}.sub-count small{font-size:11px;margin-left:2px;font-weight:650;color:var(--muted)}
    .chev{font-size:20px;color:var(--dim);margin-left:2px}
    .hint{margin:14px 2px 0;color:var(--dim);font-size:11px;line-height:1.55}
    .selection{margin-top:16px;min-height:48px;border:1px solid var(--line);background:rgba(255,255,255,.018);border-radius:12px;display:flex;align-items:center;padding:0 15px;color:var(--muted);font-size:13px}
    @media(max-width:640px){
      body{padding:18px 12px}.kpis{gap:9px}.kpi{padding:11px;border-radius:14px;gap:10px}.main{gap:8px;min-height:78px}
      .labelbox{width:52px;flex-basis:52px;border-radius:11px;font-size:13px;white-space:nowrap}.metric .name{display:none}.metric .value{font-size:29px;white-space:nowrap}.metric .unit{font-size:11px;margin-left:2px}.metric .ratio{font-size:11px}
      .check{display:none}
      .subrow{padding-top:9px}.sub{min-height:43px;padding:0 8px;gap:7px}.sub-label{font-size:11px}.sub-desc{display:none}.sub-count{font-size:15px}.chev{font-size:16px}.dot{width:7px;height:7px}
      .hint{font-size:10px}.selection{font-size:11px;padding:10px 12px;min-height:42px}
    }
    @media(max-width:390px){.labelbox{width:46px;flex-basis:46px;font-size:12px}.metric .value{font-size:26px}.metric .unit{display:none}.metric .ratio{font-size:10px}.sub-count small{display:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">업무현황 · KPI 위젯 제안</p>
    <section class="kpis" aria-label="업무현황 요약">
      <article class="kpi ongoing" data-active="true">
        <button class="main" type="button" data-view="진행중 업무 12건">
          <span class="labelbox">진행중</span>
          <span class="metric"><span class="name">팀 전체 진행 업무</span><br><span class="value">12<span class="unit">건</span></span></span>
          <span class="main-spacer"></span>
          <span class="check"><strong>3건</strong><span>Check</span></span>
        </button>
        <div class="subrow">
          <button class="sub hold" type="button" data-view="보류 업무 2건">
            <span class="dot"></span><span><span class="sub-label">보류 업무</span><br><span class="sub-desc">진행중과 함께 관리</span></span><span class="sub-count">2<small>건</small></span><span class="chev">›</span>
          </button>
        </div>
      </article>
      <article class="kpi done" data-active="false">
        <button class="main" type="button" data-view="완료 업무 31건">
          <span class="labelbox">완료</span>
          <span class="metric"><span class="name">완료된 업무</span><br><span class="value">31<span class="ratio">/ 45</span><span class="unit">건</span></span></span>
          <span class="main-spacer"></span>
        </button>
        <div class="subrow">
          <button class="sub remind" type="button" data-view="Remind 업무 5건">
            <span class="dot"></span><span><span class="sub-label">Remind</span><br><span class="sub-desc">완료 업무 중 다시 볼 항목</span></span><span class="sub-count">5<small>건</small></span><span class="chev">›</span>
          </button>
        </div>
      </article>
    </section>
    <p class="hint">상단 본영역은 진행중·완료 목록을 열고, 하단 보조영역은 각각 보류·Remind 목록만 바로 엽니다. Check는 진행중 업무의 속성이므로 진행중 카드 안에 유지했습니다.</p>
    <div class="selection" id="selection">현재 선택: 진행중 업무 12건</div>
  </main>
  <script>
    const out=document.querySelector('#selection');
    document.querySelectorAll('[data-view]').forEach((button)=>button.addEventListener('click',()=>{
      document.querySelectorAll('.kpi').forEach((card)=>card.dataset.active='false');
      button.closest('.kpi').dataset.active='true';
      out.textContent='현재 선택: '+button.dataset.view;
    }));
  </script>
</body>
</html>
